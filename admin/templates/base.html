<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Digiturk Bayi - Admin{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f6f9; }
        .sidebar { min-height: 100vh; background: #1a1a2e; }
        .sidebar .nav-link { color: #a0a0b0; padding: 12px 20px; }
        .sidebar .nav-link:hover, .sidebar .nav-link.active { color: #fff; background: rgba(255,255,255,0.1); }
        .sidebar .nav-link i { margin-right: 10px; width: 20px; text-align: center; }
        .stat-card { border: none; border-radius: 12px; }
        .stat-card .card-body { padding: 1.5rem; }
        .stat-number { font-size: 2rem; font-weight: 700; }
        .brand { color: #fff; font-weight: 700; font-size: 1.3rem; padding: 20px; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .badge-status-active { background: #28a745; }
        .badge-status-completed { background: #007bff; }
        .badge-status-pending { background: #ffc107; color: #000; }
        .badge-status-failed { background: #dc3545; }
        .badge-status-link_sent { background: #17a2b8; }
        .badge-status-expired { background: #6c757d; }
    </style>
</head>
<body>
    <div class="container-fluid">
        <div class="row">
            <!-- Sidebar -->
            <nav class="col-md-2 d-none d-md-block sidebar px-0">
                <div class="brand">
                    <i class="bi bi-broadcast"></i> Digiturk Bayi
                </div>
                <ul class="nav flex-column mt-3">
                    <li class="nav-item">
                        <a class="nav-link {% if active_page == 'dashboard' %}active{% endif %}" href="/admin/">
                            <i class="bi bi-speedometer2"></i> Dashboard
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if active_page == 'packages' %}active{% endif %}" href="/admin/packages">
                            <i class="bi bi-box-seam"></i> Paketler
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if active_page == 'applications' %}active{% endif %}" href="/admin/applications">
                            <i class="bi bi-file-earmark-text"></i> Basvurular
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if active_page == 'calls' %}active{% endif %}" href="/admin/calls">
                            <i class="bi bi-telephone"></i> Cagrilar
                        </a>
                    </li>
                </ul>
            </nav>

            <!-- Main Content -->
            <main class="col-md-10 ms-auto px-4 py-4">
                {% block content %}{% endblock %}
            </main>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
